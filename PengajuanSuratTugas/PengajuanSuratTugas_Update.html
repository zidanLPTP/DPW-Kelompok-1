<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Pengajuan Surat Tugas</title>
    <link rel="stylesheet" href="PengajuanSuratTugas_Update.css">
</head>
<body>

    <div class="container">
        <h1>Update Surat Tugas</h1>

        <form id="formPengajuan">
            <label for="pengusul">Pengusul:</label>
            <input type="text" id="pengusul" placeholder="Nama Lengkap">

            <label for="nip">NIP:</label>
            <input type="text" id="nip" placeholder="Nomor Induk Pegawai">

            <label for="waktu">Waktu Pelaksanaan:</label>
            <input type="date" id="waktu">

            <label for="lama">Lama Pelaksanaan (Hari):</label>
            <input type="number" id="lama" min="1" placeholder="Contoh: 3">

            <label for="perihal">Perihal:</label>
            <input type="text" id="perihal" placeholder="Kegiatan yang dilakukan...">

            <label for="berkas">Berkas Pendukung (Keterangan/Link):</label>
            <textarea id="berkas" rows="4" placeholder="Keterangan tambahan atau link Google Drive..."></textarea>

            <button type="submit" id="btnKirim">Kirim Pengajuan</button>
        </form>
    </div>
 
    <script src="PengajuanSuratTugas_Update.js"></script>
</body>
</html>
