<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pembuatan Card, Tabel, dan Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
         header {
            background-color: #a30707;
            padding: 40px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            border-bottom: #333 solid 4px;
        }
        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 250px;
            padding: 16px;
            margin: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            border-radius: 8px;
        }
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
        }
        table, th, td {
            border: 2px solid black;
            padding: 8px;
            text-align: left;
        }
        form {
            margin-top: 20px;
        }
        nav {
            background-color: #a63c3c;
            padding: 10px;
            text-align: right;
            margin-bottom: 10px;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            overflow: hidden;
            margin: 0;
            background-color: #a63c3c;
        }
        nav ul li {
            display: inline;
            margin-right: 10px;
            float: left;
        }
        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
         nav ul li:hover a {
            color: #a30707;
            background-color: #f0f0f0;
         }
         section {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        button {
            width: 5%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Website Kepegawaian Teknik</h1>
    </header>
    <nav>
        <ul>
            <li><a href="DPW-Kelompok-1/Dashboard.html">Dashboard</a></li>
        </ul>
    </nav>
    <!-- Tabel -->
    <h2>Pengisian Data</h2>
    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Usia</th>
                <th>Jabatan</th>
            </tr>
        <tr>
            <td>Alice</td>
            <td>30</td>
            <td>Manager</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>25</td>
            <td>Staff</td>
        </tr>
        <button>Update</button>
    <!-- Form -->
</body>
</html>
