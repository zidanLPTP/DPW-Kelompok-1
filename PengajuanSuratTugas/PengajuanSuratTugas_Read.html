<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pembuatan Card, Tabel, dan Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
         header {
            background-color: #a30707;
            padding: 40px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            border-bottom: #333 solid 2px;
        }
        .back-button-container {
            margin-bottom: 20px;
        }
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #a30707;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
            border: 2px solid #a30707;
        }
        .back-button:hover {
            background-color: white;
            color: #a30707;
            box-shadow: 0 2px 8px rgba(163, 7, 7, 0.3);
        }
        .TambahData-container {
            margin-top: 20px;
        }
        .TambahData {
            display: inline-block;
            padding: 10px 20px;
            background-color: #a30707;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
            border: 2px solid #a30707;
        }
        .TambahData:hover {
            background-color: white;
            color: #a30707;
            box-shadow: 0 2px 8px rgba(163, 7, 7, 0.3);
        }
        
        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 250px;
            padding: 16px;
            margin: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            border-radius: 8px;
        }
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
        }
        table, th, td {
            border: 2px solid black;
            padding: 8px;
            text-align: left;
        }
        form {
            margin-top: 20px;
        }
         section {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <header>
        <h1>Website Kepegawaian Teknik</h1>
    </header>
    <div class="back-button-container">
        <a href="../Dashboard.html" class="back-button">Kembali ke Dashboard</a>
    </div>
    <!-- Tabel -->
    <h2>Pengisian Data</h2>
    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Usia</th>
                <th>Jabatan</th>
            </tr>
        <tr>
            <td>Alice</td>
            <td>30</td>
            <td>Manager</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>25</td>
            <td>Staff</td>
        </tr>
    <div class="TambahData-container">
        <a href="../PengajuanSuratTugas/PengajuanSuratTugas_Create.html" class="TambahData">Tambah Data</a>
    </div>
    <!-- Form -->
</body>
</html>
